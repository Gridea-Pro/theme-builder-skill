{{/*
  404.html — 页面未找到模板（Go 模板语法）

  【说明】
  访问不存在的页面时显示。
  提供清晰提示和返回首页链接。
*/}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {{ template "partials/head.html" . }}
  <title>页面未找到 - {{ .Config.SiteName }}</title>
</head>
<body>
  {{ template "partials/header.html" . }}

  <main class="site-main">
    <div class="container">
      <div class="error-page">
        <div class="error-page__code">404</div>
        <p class="error-page__message">抱歉，您访问的页面不存在或已被移除。</p>
        <a href="{{ .Config.Domain }}" class="error-page__link">← 返回首页</a>
      </div>
    </div>
  </main>

  {{ template "partials/footer.html" . }}

  {{ if .ThemeConfig.EnableDarkMode }}
  <script>
    (function() {
      var toggle = document.querySelector('.theme-toggle');
      if (!toggle) return;
      var html = document.documentElement;
      var saved = localStorage.getItem('theme');
      if (saved) { html.setAttribute('data-theme', saved); }
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) { html.setAttribute('data-theme', 'dark'); }
      toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
  {{ end }}
</body>
</html>
