name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Scaffold / Validate / Render smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [jinja2, go, ejs]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scaffold theme (${{ matrix.engine }})
        run: python scripts/scaffold_theme.py ci-smoke --engine ${{ matrix.engine }} --output-dir ./_ci_themes

      - name: Validate syntax
        run: python scripts/validate_syntax.py ./_ci_themes/ci-smoke

      - name: Render test
        run: python scripts/render_test.py ./_ci_themes/ci-smoke --output-dir ./_ci_output
        if: matrix.engine == 'jinja2'
